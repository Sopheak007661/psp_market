<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      PSP MART
    </title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="./src/assets/BrandLogo.png" />
    <!-- icon -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
     <style>
        /* 1. Chatbot Main Container position */
        #chatbot-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            z-index: 9999;
        }

        /* 2. Floating Icon Style */
        #chat-icon {
            width: 60px;
            height: 60px;
            background: #0078ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }
        #chat-icon:hover { transform: scale(1.1); }
        #chat-icon img { width: 32px; height: 32px; filter: invert(1); }

        /* 3. Chat Window Layout */
        #chat-window {
            /* display: flex;
            position:absolute;
            left:0px;
            right:0px; */
            width:400px;
            height: 550px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            margin-bottom: 15px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .chat-hidden {
            display: none !important;
        }

        /* Header UI */
        .chat-header {
            background: #0078ff;
            color: white;
            padding: 15px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-header button {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }

        /* Message Display Area */
        #chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            background: #f9f9f9;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .msg { padding: 8px 12px; border-radius: 8px; max-width: 80%; font-size: 14px; }
        .user-msg { background: #0078ff; color: white; align-self: flex-end; }
        .bot-msg { background: #e9e9eb; color: #333; align-self: flex-start; }

        /* Input Area at bottom */
        .chat-input-area {
            display: flex;
            padding: 10px;
            border-top: 1px solid #eee;
            background: white;
        }
        .chat-input-area input {
            flex: 1;
            border: 1px solid #ddd;
            border-radius: 20px;
            padding: 8px 15px;
            outline: none;
        }
        .chat-input-area button {
            background: #0078ff;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            margin-left: 5px;
            cursor: pointer;
        }
    </style>
  </head>
  <body class="bg-gray-50">
    <div id="root">
    </div>
    <div id="chatbot-container">
        
        <div id="chat-window" class="chat-hidden">
            <div class="chat-header">
                <span>AI Assistant</span>
                <button onclick="toggleChat()">×</button>
            </div>
            <div id="chat-messages">
                <div class="msg bot-msg">Hello! How can I help you with our project today?</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="user-input" placeholder="Ask me anything..." onkeypress="handleKeyPress(event)">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>

        <div id="chat-icon" onclick="toggleChat()">
            <img src="https://cdn-icons-png.flaticon.com/512/134/134914.png" alt="Chat Icon">
        </div>

    </div>
   <script>
    // Open or close the chatbot window
    function toggleChat() {
        const chatWindow = document.getElementById('chat-window');
        chatWindow.classList.toggle('chat-hidden');
    }

    // Allow sending message by hitting "Enter" key
    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            sendMessage();
        }
    }

    // Send text to backend and fetch the response
    async function sendMessage() {
        const input = document.getElementById('user-input');
        const msgContainer = document.getElementById('chat-messages');
        const userText = input.value.trim();

        if (userText === "") return;

        // 1. Show user message instantly on screen
        msgContainer.innerHTML += `<div class="msg user-msg">${userText}</div>`;
        input.value = ""; // Clear input field
        msgContainer.scrollTop = msgContainer.scrollHeight; // Scroll to bottom

        // 2. Show a temporary "thinking..." indicator
        const typingId = "typing-" + Date.now();
        msgContainer.innerHTML += `<div class="msg bot-msg" id="${typingId}">Thinking...</div>`;
        msgContainer.scrollTop = msgContainer.scrollHeight;

        try {
            // 3. Connect to your Local Node.js Backend Server on port 5500
           await fetch('https://backend-psp-market.onrender.com/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: userText })
            });
            
            const data = await response.json();
            
            // Remove thinking indicator safely
            const typingIndicator = document.getElementById(typingId);
            if (typingIndicator) typingIndicator.remove();
            
            // 4. Validate server data output to prevent 'undefined' text
            if (data.error) {
                msgContainer.innerHTML += `<div class="msg bot-msg" style="color: #d9534f; background: #fdf7f7;"><strong>Error:</strong> ${data.error}</div>`;
            } else if (data.reply) {
                msgContainer.innerHTML += `<div class="msg bot-msg">${data.reply}</div>`;
            } else {
                msgContainer.innerHTML += `<div class="msg bot-msg" style="color: #d9534f; background: #fdf7f7;"><strong>Error:</strong> Unexpected response format from server.</div>`;
            }
            
        } catch (error) {
            // Handle offline network status or server crashes
            const typingIndicator = document.getElementById(typingId);
            if (typingIndicator) typingIndicator.remove();
            msgContainer.innerHTML += `<div class="msg bot-msg" style="color: #d9534f; background: #fdf7f7;"><strong>Error:</strong> Cannot reach backend server. Make sure node server.js is active.</div>`;
        }

        msgContainer.scrollTop = msgContainer.scrollHeight; // Final layout alignment scroll
    }
  </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
